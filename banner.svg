<svg width="1500" height="420" viewBox="0 0 1500 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f1a"/>
      <stop offset="55%" stop-color="#121a2e"/>
      <stop offset="100%" stop-color="#1a1030"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1500" height="420" fill="url(#bg)"/>
  <rect width="1500" height="420" fill="url(#grid)"/>

  <circle cx="1250" cy="90" r="260" fill="url(#glow1)"/>
  <circle cx="180" cy="380" r="240" fill="url(#glow2)"/>

  <!-- subtle circuit-style accent lines -->
  <g stroke="url(#accent)" stroke-width="1.5" fill="none" opacity="0.35">
    <path d="M 1080 60 L 1150 60 L 1150 120 L 1220 120"/>
    <path d="M 1300 200 L 1370 200 L 1370 260"/>
    <path d="M 60 300 L 130 300 L 130 240"/>
    <circle cx="1220" cy="120" r="4" fill="#a855f7" stroke="none"/>
    <circle cx="1370" cy="260" r="4" fill="#3b82f6" stroke="none"/>
    <circle cx="130" cy="240" r="4" fill="#3b82f6" stroke="none"/>
  </g>

  <!-- name -->
  <text x="90" y="185" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="64" font-weight="700" fill="#f5f7ff">
    Hashir Abbasi
  </text>

  <!-- accent underline -->
  <rect x="92" y="205" width="230" height="6" rx="3" fill="url(#accent)"/>

  <!-- role line -->
  <text x="90" y="260" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="30" font-weight="500" fill="#b9c2d9">
    AI Engineer &#8226; Backend Developer &#8226; Open Source Learner
  </text>

  <!-- tag pills -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" font-weight="600">
    <rect x="90" y="300" width="150" height="42" rx="21" fill="#ffffff" fill-opacity="0.06" stroke="#3b82f6" stroke-opacity="0.6"/>
    <text x="115" y="327" fill="#8fb4ff">LLMs / RAG</text>

    <rect x="256" y="300" width="140" height="42" rx="21" fill="#ffffff" fill-opacity="0.06" stroke="#a855f7" stroke-opacity="0.6"/>
    <text x="281" y="327" fill="#d5aaff">FastAPI</text>

    <rect x="412" y="300" width="180" height="42" rx="21" fill="#ffffff" fill-opacity="0.06" stroke="#3b82f6" stroke-opacity="0.6"/>
    <text x="437" y="327" fill="#8fb4ff">Agentic AI</text>

    <rect x="608" y="300" width="160" height="42" rx="21" fill="#ffffff" fill-opacity="0.06" stroke="#a855f7" stroke-opacity="0.6"/>
    <text x="633" y="327" fill="#d5aaff">LangGraph</text>
  </g>
</svg>
